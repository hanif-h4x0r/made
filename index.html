<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montre | Official Store</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; margin: 0; padding: 0; color: #333; }
        header { padding: 2rem; text-align: center; border-bottom: 1px solid #eee; }
        h1 { font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 20px; }
        
        /* Grid Produk */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 2rem; 
        }
        
        .product-card { border: 1px solid #f0f0f0; padding: 15px; text-align: center; transition: 0.3s; }
        .product-card:hover { border-color: #333; }
        .product-card img { width: 100%; height: 300px; object-fit: cover; background: #eee; }
        .product-card h3 { margin: 10px 0; font-size: 1.1rem; }
        .price { font-weight: bold; color: #555; }
        
        button { background: #000; color: #fff; border: none; padding: 10px 20px; margin-top: 10px; cursor: pointer; width: 100%; }
        button:hover { background: #333; }
    </style>
</head>
<body>

    <header>
        <h1>Montre</h1>
        <p>Timeless Essentials</p>
    </header>

    <div class="container">
        <h2>New Arrivals</h2>
        <div class="product-grid" id="productContainer">
            <!-- Data produk nanti bakal muncul di sini via Javascript -->
            <p>Loading produk...</p>
        </div>
    </div>

    <script>
        // Nanti ganti dengan URL Backend Vercel kamu
        const BACKEND_URL = "https://made-neon.vercel.app"; 

        async function fetchProducts() {
            const container = document.getElementById('productContainer');
            try {
                // Nanti endpointnya akan /products
                const response = await fetch(`${BACKEND_URL}/products`);
                const products = await response.json();

                container.innerHTML = products.map(p => `
                    <div class="product-card">
                        <img src="${p.image_url}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <p class="price">Rp ${p.price.toLocaleString()}</p>
                        <button>Add to Cart</button>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = "Belum ada produk atau backend belum aktif.";
            }
        }

        // Jalankan fungsi
        fetchProducts();
    </script>
</body>
</html>
